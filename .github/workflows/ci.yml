# spec-lint CI + AI 质量门禁
name: Spec-Lint CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # ── 第一阶段：构建 + 测试 ──────────────────────────
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

  # ── 第二阶段：SDD 自我一致性检查 ──────────────────
  spec-consistency-check:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run spec-lint self-check
        run: npm run lint

      - name: SDD 方法论验证
        run: |
          echo "✅ 规格驱动开发闭环验证通过"
          echo "  - 规格文档 → specs/spec-lint.spec.md"
          echo "  - 源码实现 → src/ (parser, checker, ai-reviewer, reporter, CLI)"
          echo "  - 一致性检查 → spec-lint 自我检查"

  # ── 第三阶段：AI 质量门禁（Ollama 免费方案）──────
  ai-quality-gate:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Setup Ollama (free local AI)
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          ollama serve &
          sleep 5
          ollama pull qwen2.5:1.5b

      - name: AI-powered spec review (informational)
        continue-on-error: true
        run: node dist/index.js --ai --spec ./specs --src ./src
