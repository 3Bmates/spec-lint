# spec-lint CI + AI 质量门禁
# Gitee 兼容（Gitee 也支持 GitHub Actions 格式）
name: Spec-Lint CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # ── 第一阶段：基础检查 ──────────────────────────
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

  # ── 第二阶段：SDD 自我一致性检查 ──────────────────
  spec-consistency-check:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run spec-lint self-check
        run: npm run lint

  # ── 第三阶段：AI 质量门禁（可选） ────────────────
  ai-quality-gate:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.action != 'closed'
    env:
      AI_API_KEY: ${{ secrets.AI_API_KEY || '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: AI-powered spec review
        if: env.AI_API_KEY != ''
        run: |
          echo "🤖 运行 AI 语义审查..."
          node dist/index.js --ai --spec ./specs --src ./src || true

      - name: AI-powered code review (PR diff)
        if: env.AI_API_KEY != ''
        run: |
          echo "🤖 AI 代码审查已启用（请在仓库 Settings > Secrets 中配置 AI_API_KEY）"
          echo "当前为演示阶段，AI 审查结果仅供参考"
